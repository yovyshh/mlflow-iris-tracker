<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLflow Experiment Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>MLflow Experiment Tracker</h1>
        <p>A simple tracker for Iris dataset experiments.</p>

        <div class="experiment-card">
            <h2>Latest Experiment Details</h2>
            <div id="loading" class="hidden">Running training... Please wait.</div>
            <div id="results">
                <p><strong>Experiment Name:</strong> <span id="experiment_name">N/A</span></p>
                <p><strong>Run ID:</strong> <span id="run_id">N/A</span></p>
                <p><strong>Parameters:</strong> <span id="parameters">N/A</span></p>
                <p><strong>Accuracy Score:</strong> <span id="accuracy">N/A</span></p>
                <p><strong>Training Status:</strong> <span id="status">Idle</span></p>
            </div>
            <button id="run-btn">Run Training</button>
        </div>

        <div class="experiment-card">
            <h2>Test the Model</h2>
            <div class="input-group">
                <label>Sepal Length (cm):</label>
                <input type="number" id="sepal_length" step="0.1" value="5.1">
            </div>
            <div class="input-group">
                <label>Sepal Width (cm):</label>
                <input type="number" id="sepal_width" step="0.1" value="3.5">
            </div>
            <div class="input-group">
                <label>Petal Length (cm):</label>
                <input type="number" id="petal_length" step="0.1" value="1.4">
            </div>
            <div class="input-group">
                <label>Petal Width (cm):</label>
                <input type="number" id="petal_width" step="0.1" value="0.2">
            </div>
            <button id="predict-btn">Predict Species</button>
            <div id="prediction-result" class="prediction-box hidden">
                Prediction: <span id="predicted-species"></span>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
